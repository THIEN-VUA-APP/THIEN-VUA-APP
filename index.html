<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>THIỆN VUA APP</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
}

h1{
margin-top:40px;
}

.app-box{
margin:40px auto;
width:90%;
height:800px;
border-radius:10px;
overflow:hidden;
border:2px solid #333;
}

iframe{
width:100%;
height:100%;
border:none;
}

button{
padding:15px 30px;
font-size:18px;
margin:20px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>THIỆN VUA APP STORE</h1>

<button onclick="openApp('poster')">AI TẠO POSTER</button>
<button onclick="openApp('chat')">AI CHATBOT</button>
<button onclick="openApp('video')">AI VIDEO</button>

<div class="app-box" id="appFrame"></div>

<script>

function openApp(app){

let url="";

if(app==="poster"){
url="https://ai.studio/apps/drive/1DgoJx76uWDXO5lVP983fRt1PzEFeSdGc?fullscreenApplet=true";
}

document.getElementById("appFrame").innerHTML =
`<iframe src="${url}"></iframe>`;

}

</script>

</body>
</html>
